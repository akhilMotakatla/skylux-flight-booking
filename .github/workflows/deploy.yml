name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Angular app
        working-directory: frontend
        run: npx ng build --base-href "/skylux-flight-booking/"

      - name: Find build output and prepare for deploy
        run: |
          DIST=$(find frontend/dist -name "index.html" | head -1 | xargs dirname)
          echo "DIST_DIR=$DIST" >> $GITHUB_ENV
          cp "$DIST/index.html" "$DIST/404.html"
          touch "$DIST/.nojekyll"
          echo "Deploying from: $DIST"
          ls "$DIST"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.DIST_DIR }}
          publish_branch: gh-pages
